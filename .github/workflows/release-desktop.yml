name: Release Desktop

# Builds the Flutter desktop app for macOS and Windows and, on a version tag,
# publishes a GitHub Release with the artifacts.
#
#   • Tag push  (v1.2.3)             -> build + publish a GitHub Release
#   • Manual run (workflow_dispatch) -> build + upload artifacts only (no release)
#
# Artifacts are UNSIGNED (no Apple Developer ID / Windows Authenticode cert in
# this repo). First-run unlock steps ship in the Release notes and in
# packaging/README.md. To sign/notarize later, add the cert as a repo secret and
# a codesign+notarytool / signtool step before packaging.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for a manual (non-tag) build"
        required: false
        default: "dev"

permissions:
  contents: write # required to create the Release + upload assets

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.44.5"
  APP_DISPLAY_NAME: Watchparty

jobs:
  macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest # Apple Silicon; `flutter build macos` emits a universal (x64+arm64) .app
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${INPUT_VERSION#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: flutter_app
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          IS_TAG: ${{ github.ref_type == 'tag' }}
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          ARGS=()
          if [ "$IS_TAG" = "true" ]; then
            # CFBundleShortVersionString must be numeric dotted — strip any -suffix.
            ARGS+=(--build-name="${VERSION%%-*}" --build-number="${GITHUB_RUN_NUMBER}")
          fi
          flutter build macos --release "${ARGS[@]}"

      - name: Package .dmg
        working-directory: flutter_app
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)"
          test -n "$APP_PATH" || { echo "::error::no .app produced under build/macos/Build/Products/Release"; exit 1; }
          echo "App bundle: $APP_PATH"
          # `flutter build macos --release` already ad-hoc signs the bundle (no
          # signing team => identity "-"). Re-seal the OUTER bundle only (no
          # --deep, which Apple discourages for signing and which mis-orders the
          # nested media_kit / flutter_webrtc frameworks) so the Release
          # entitlements are embedded. This is NOT notarization — see the Release
          # notes for the first-run unlock (Gatekeeper blocks it otherwise).
          codesign --force --sign - --entitlements macos/Runner/Release.entitlements "$APP_PATH"
          codesign --verify --verbose=2 "$APP_PATH" || echo "::warning::codesign verify reported issues (ad-hoc, expected to still launch)"
          mkdir -p dmg-stage dist
          cp -R "$APP_PATH" dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create -volname "$APP_DISPLAY_NAME" \
            -srcfolder dmg-stage -ov -format UDZO \
            "dist/Watchparty-${VERSION}-macos.dmg"
          ls -lh dist

      - uses: actions/upload-artifact@v6
        with:
          name: watchparty-macos
          path: flutter_app/dist/*.dmg
          if-no-files-found: error

  windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${INPUT_VERSION#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: flutter_app
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          IS_TAG: ${{ github.ref_type == 'tag' }}
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          ARGS=()
          if [ "$IS_TAG" = "true" ]; then
            ARGS+=(--build-name="${VERSION%%-*}" --build-number="${GITHUB_RUN_NUMBER}")
          fi
          flutter build windows --release "${ARGS[@]}"

      - name: Package .zip
        working-directory: flutter_app
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $rel = "build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "Release folder not found: $rel" }
          # Flutter release builds dynamically link the MSVC runtime, which a
          # clean Windows box does not ship. Bundle the 4 redistributable DLLs
          # next to the exe so the unsigned zip runs without the VC++ installer.
          $sys = Join-Path $env:SystemRoot 'System32'
          foreach ($d in 'msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll','msvcp140_1.dll') {
            Copy-Item (Join-Path $sys $d) $rel -Force
          }
          # Stage under a named folder so the zip extracts to one Watchparty\ dir
          # instead of scattering loose files into the user's cwd.
          $stage = "dist/stage/Watchparty"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$rel/*" $stage -Recurse -Force
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/Watchparty-$env:VERSION-windows-x64.zip"
          Compress-Archive -Path "dist/stage/Watchparty" -DestinationPath $zip -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v6
        with:
          name: watchparty-windows
          path: flutter_app/dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [macos, windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -exec sha256sum {} + > SHA256SUMS
          cat SHA256SUMS
          ls -lhR .

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          append_body: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ### Install (unsigned build)

            Verify against `SHA256SUMS` first (`sha256sum -c SHA256SUMS` / `Get-FileHash`).

            **macOS** — `Watchparty-<version>-macos.dmg`: open the dmg, drag **Watchparty** to Applications. The first launch is blocked (not notarized). Either:
            - System Settings → Privacy & Security → scroll to Security → **Open Anyway**, or
            - `xattr -dr com.apple.quarantine /Applications/Watchparty.app`

            (The old right-click → Open trick no longer works on macOS 15+.)

            **Windows** — `Watchparty-<version>-windows-x64.zip`: extract the `Watchparty` folder and run `watchparty.exe`. If SmartScreen warns: **More info → Run anyway**.
