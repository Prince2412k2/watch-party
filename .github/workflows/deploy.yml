name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            cd /opt/watch-party
            git pull origin main

            # secrets/ is gitignored by design (real API keys/session secret/
            # TURN creds) — `git pull` never puts it here. It must be seeded
            # on this VPS once, out of band (scp/rsync), before the first
            # deploy. Fail loudly and early instead of letting docker compose
            # fail midway through an image pull, which is what was happening.
            if [ ! -f secrets/.env ] || [ ! -f secrets/.env.local ]; then
              echo "::error::secrets/.env or secrets/.env.local missing on the VPS." \
                   "Copy them from your prod secrets/ directory (see secrets/README.md)" \
                   "before the first deploy — they are intentionally never committed."
              exit 1
            fi

            # --env-file secrets/.env is required (not just env_file: in the
            # compose file) so ${VPS_PUBLIC_IP} interpolates into livekit's
            # NODE_IP and coturn's -X flag at compose parse time.
            docker compose --env-file secrets/.env -f docker-compose.prod.yml pull
            docker compose --env-file secrets/.env -f docker-compose.prod.yml up -d --build
