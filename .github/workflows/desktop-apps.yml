name: Desktop Apps

on:
  push:
    branches:
      - main
    paths:
      - "flutter_app/**"
      - ".github/workflows/desktop-apps.yml"
  pull_request:
    branches:
      - main
    paths:
      - "flutter_app/**"
      - ".github/workflows/desktop-apps.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-apps-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.5"
  APP_DISPLAY_NAME: Watchparty
  SERVER_BUILDS_PATH: ${{ vars.DESKTOP_BUILDS_PATH || '/opt/watch-party/builds/desktop' }}

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          base="$(grep -m1 '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          echo "version=${base}-ci${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: flutter_app
        shell: bash
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

      - name: Package dmg
        working-directory: flutter_app
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)"
          test -n "$app_path" || { echo "::error::no .app produced under build/macos/Build/Products/Release"; exit 1; }
          codesign --force --sign - --entitlements macos/Runner/Release.entitlements "$app_path"
          mkdir -p dmg-stage dist
          cp -R "$app_path" dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create -volname "$APP_DISPLAY_NAME" -srcfolder dmg-stage -ov -format UDZO "dist/Watchparty-${VERSION}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: watchparty-macos
          path: flutter_app/dist/*.dmg
          if-no-files-found: error

  windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          base="$(grep -m1 '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          echo "version=${base}-ci${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Prepare Flutter
        working-directory: flutter_app
        shell: pwsh
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          $roots = @($env:PUB_CACHE, "$env:LOCALAPPDATA\Pub\Cache", "$env:APPDATA\Pub\Cache") |
            Where-Object { $_ -and (Test-Path (Join-Path $_ 'hosted\pub.dev')) }
          $flutterWebrtc = $null
          foreach ($root in $roots) {
            $candidate = Get-ChildItem (Join-Path $root 'hosted\pub.dev') -Directory -Filter 'flutter_webrtc-*' -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($candidate) { $flutterWebrtc = $candidate; break }
          }
          if (-not $flutterWebrtc) { throw 'flutter_webrtc not found in pub cache' }
          $version = $flutterWebrtc.Name -replace '^flutter_webrtc-',''
          $thirdParty = Join-Path $flutterWebrtc.FullName 'third_party'
          if (-not (Test-Path (Join-Path $thirdParty 'libwebrtc'))) {
            $downloads = Join-Path $thirdParty 'downloads'
            New-Item -ItemType Directory -Force -Path $downloads | Out-Null
            $zip = Join-Path $downloads 'libwebrtc.zip'
            Invoke-WebRequest -Uri "https://github.com/flutter-webrtc/flutter-webrtc/releases/download/v$version/libwebrtc.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $thirdParty -Force
          }
          if (-not (Test-Path (Join-Path $thirdParty 'libwebrtc'))) { throw 'libwebrtc pre-seed failed' }

      - name: Build
        working-directory: flutter_app
        shell: bash
        run: flutter build windows --release

      - name: Package zip
        working-directory: flutter_app
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $release = 'build/windows/x64/runner/Release'
          if (-not (Test-Path $release)) { throw "Release folder not found: $release" }
          $system32 = Join-Path $env:SystemRoot 'System32'
          foreach ($dll in 'msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll','msvcp140_1.dll') {
            Copy-Item (Join-Path $system32 $dll) $release -Force
          }
          $stage = 'dist/stage/Watchparty'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$release/*" $stage -Recurse -Force
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path 'dist/stage/Watchparty' -DestinationPath "dist/Watchparty-$env:VERSION-windows-x64.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: watchparty-windows
          path: flutter_app/dist/*.zip
          if-no-files-found: error

  publish-latest:
    name: Replace latest server build
    needs: [macos, windows]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: desktop-builds
          merge-multiple: true

      - name: Write manifest
        shell: bash
        run: |
          set -euo pipefail
          cd desktop-builds
          sha256sum * > SHA256SUMS
          {
            echo "commit=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > BUILD.txt

      - name: Upload build to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: desktop-builds/*
          target: ${{ env.SERVER_BUILDS_PATH }}/incoming-${{ github.run_id }}
          strip_components: 1

      - name: Replace latest build on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -euo pipefail
            root="${{ env.SERVER_BUILDS_PATH }}"
            incoming="$root/incoming-${{ github.run_id }}"
            test -d "$incoming"
            rm -rf "$root/previous"
            if [ -d "$root/latest" ]; then mv "$root/latest" "$root/previous"; fi
            mv "$incoming" "$root/latest"
            find "$root" -maxdepth 1 -type d -name 'incoming-*' -mtime +1 -exec rm -rf {} +
            ls -lh "$root/latest"
