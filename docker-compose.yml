# Unified watch-party deployment — SINGLE source of truth.
#
# All services share one bridge network (watchparty-net) so they resolve each
# other by container name (e.g. the app reaches http://jellyfin:8096,
# http://sonarr:8989, ws://livekit:7880). The app builds + serves the frontend
# and exposes /api + Socket.io on ONE host port (3000).
#
# Bring up:  docker compose up -d --build
#
# NOTE: docker-compose.servarr.yml is superseded by this file — the servarr
# services below are the canonical definitions. Do not run both compose files
# for the same services at once.

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: watchparty-jellyfin
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./media:/media
      # Servarr-imported media (Radarr/Sonarr import into ${MEDIA_ROOT}/media/{movies,tv})
      # mounted read-only so Jellyfin can scan downloaded content — a "Shows"
      # library points at /servarr-media/tv and the Movies library also scans
      # /servarr-media/movies. This bridges the Jellyfin (./media) vs Servarr
      # (./media-data) tree split so grabbed titles appear in the library.
      - ${MEDIA_ROOT:-./media-data}/media:/servarr-media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=http://localhost:8096

  livekit:
    image: livekit/livekit-server:latest
    container_name: watchparty-livekit
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

  # coturn — uncomment for VPS deploy
  # coturn:
  #   image: coturn/coturn:latest
  #   container_name: watchparty-coturn
  #   network_mode: host
  #   volumes:
  #     - ./coturn.conf:/etc/coturn/turnserver.conf

  watchparty:
    build: ./app
    container_name: watchparty-app
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      # One port: built web UI + /api + Socket.io + /jellyfin + /livekit proxies.
      # Host 3000 was occupied by an unrelated process on this machine, so the
      # app is published on host 3001 -> container 3000. Change the left side to
      # "3000:3000" on a host where 3000 is free.
      - "3001:3000"
    env_file:
      # .env  = base (internal URLs, LiveKit keys, SESSION_SECRET)
      # .env.local = optional real secrets (servarr API keys, LiveKit keys).
      #   Both are pass-through only; the `environment:` block below overrides
      #   any service URLs so internal names always win inside the container.
      - .env
      - .env.local
    environment:
      # ── Server → service: INTERNAL container names (never sent to browser) ──
      - JELLYFIN_URL=http://jellyfin:8096
      - LIVEKIT_URL=ws://livekit:7880
      - SONARR_URL=http://sonarr:8989
      - RADARR_URL=http://radarr:7878
      # Prowlarr shares gluetun's network namespace (VPN tunnel) — it has no
      # network identity of its own, so it's reached via the gluetun hostname.
      - PROWLARR_URL=http://gluetun:9696
      - BAZARR_URL=http://bazarr:6767
      - QBITTORRENT_URL=http://qbittorrent:8080
      # ── Browser → LiveKit: must be reachable from the user's machine. ───────
      # Default is the published host port; behind HTTPS set this (in .env) to
      # the app-origin signaling proxy, e.g. wss://<host>/livekit.
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      # Extra allowed CORS origin(s), comma-separated (dev + tailnet are built in).
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN:-}
      # ── Serve config ──
      - SERVE_CLIENT=1
      - PORT=3000
    depends_on:
      jellyfin:
        condition: service_started
      livekit:
        condition: service_started
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
      gluetun:
        condition: service_started
      bazarr:
        condition: service_healthy
      qbittorrent:
        condition: service_started

  # ── VPN gateway for Prowlarr ────────────────────────────────────────────
  # Many public indexer sites are ISP-blocked. Prowlarr's entire network stack
  # routes through this ProtonVPN (WireGuard) tunnel via gluetun. Radarr,
  # Sonarr, Bazarr, qBittorrent are unaffected — they don't need it (Radarr/
  # Sonarr just call Prowlarr's API; qBittorrent's P2P exposure is a separate
  # concern from indexer-site blocking).
  #
  # Get WIREGUARD_PRIVATE_KEY / WIREGUARD_ADDRESSES from
  # https://account.protonvpn.com -> Downloads -> WireGuard configuration
  # (generate one for "Router"/generic Linux) and put them in .env.local
  # (gitignored) — NOT here. See deploy/README-servarr.md.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: watchparty-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # Required for WireGuard's split-tunnel routing to accept return traffic
    # marked by its own routing table — without it the tunnel "connects"
    # (handshake completes) but every request silently times out.
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks: [watchparty-net]
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
      - "8191:8191" # FlareSolverr (shares this netns) — for host-side testing
    # env_file only injects vars into the CONTAINER's runtime env — it does
    # NOT feed docker-compose.yml's own ${VAR} interpolation (that only reads
    # a file literally named `.env`). So .env.local must use gluetun's own
    # variable names directly (WIREGUARD_PRIVATE_KEY etc.), not a custom
    # PROTON_* alias — no ${...} substitution happening here.
    env_file:
      - .env.local
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      # Switched from WireGuard to OpenVPN: WireGuard's UDP traffic showed
      # every sign of ISP-level throttling on this network (handshake always
      # completed — tiny packets — but real data transfer consistently failed
      # regardless of exit server, MTU, or DNS mode). OpenVPN over TCP/443
      # looks like ordinary HTTPS traffic and is far harder to selectively
      # interfere with.
      - VPN_TYPE=openvpn
      - OPENVPN_PROTOCOL=tcp
      - OPENVPN_ENDPOINT_PORT=443
      # This Proton account is on the free tier (confirmed by the "SG-FREE"
      # server name) — free credentials get AUTH_FAILED on paid-only servers,
      # so server selection must be restricted to the free pool.
      - FREE_ONLY=on
      # OPENVPN_USER / OPENVPN_PASSWORD come from .env.local (see comment
      # above — these are Proton's OpenVPN-specific credentials, found at
      # account.proton.me/u/0/vpn/OpenVpn, NOT the WireGuard key/regular
      # account password).

  # ── Cloudflare-challenge solver for Prowlarr ────────────────────────────
  # Some indexers (1337x etc.) sit behind Cloudflare's bot-challenge page,
  # which no plain HTTP client can pass — regardless of VPN. FlareSolverr runs
  # a headless browser to solve it on Prowlarr's behalf. Shares gluetun's
  # network namespace (same as Prowlarr) so it egresses through the same VPN
  # tunnel and is reachable at http://localhost:8191 from inside Prowlarr.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: watchparty-flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - LOG_LEVEL=info

  # ── Media-acquisition stack (Servarr + qBittorrent) ────────────────────────
  # All on watchparty-net so the app reaches them by name and they reach each
  # other (Prowlarr -> Sonarr, Sonarr -> qBittorrent). Config + media bind
  # mounts are preserved from the previous docker-compose.servarr.yml layout.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: watchparty-prowlarr
    restart: unless-stopped
    # Shares gluetun's network namespace entirely — all Prowlarr traffic
    # (indexer requests) egresses through the VPN tunnel. No `networks:` or
    # `ports:` here; both live on gluetun instead. Reachable at
    # http://gluetun:9696 from other containers on watchparty-net.
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/prowlarr:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: watchparty-sonarr
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/sonarr:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${SONARR_PORT:-8989}:8989"
    depends_on:
      - prowlarr
      - qbittorrent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: watchparty-radarr
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/radarr:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${RADARR_PORT:-7878}:7878"
    depends_on:
      - prowlarr
      - qbittorrent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: watchparty-bazarr
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/bazarr:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    depends_on:
      - sonarr
      - radarr
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6767/api/system/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: watchparty-qbittorrent
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=${QBITTORRENT_PORT:-8080}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/qbittorrent:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${QBITTORRENT_PORT:-8080}:${QBITTORRENT_PORT:-8080}"
      - "${QBITTORRENT_BT_PORT:-6881}:6881"
      - "${QBITTORRENT_BT_PORT:-6881}:6881/udp"

networks:
  # Single shared network — every service resolves the others by container name.
  watchparty-net:
    name: watchparty-net
    driver: bridge
