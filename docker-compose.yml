# Unified watch-party deployment — SINGLE source of truth.
#
# All services share one bridge network (watchparty-net) so they resolve each
# other by container name (e.g. the app reaches http://jellyfin:8096,
# http://sonarr:8989, ws://livekit:7880). The app builds + serves the frontend
# and exposes /api + Socket.io on ONE host port (3000).
#
# Bring up:  docker compose up -d --build
#
# NOTE: docker-compose.servarr.yml is superseded by this file — the servarr
# services below are the canonical definitions. Do not run both compose files
# for the same services at once.

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: watchparty-jellyfin
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./media:/media
      # Servarr-imported media (Radarr/Sonarr import into ${MEDIA_ROOT}/media/{movies,tv})
      # mounted read-only so Jellyfin can scan downloaded content — a "Shows"
      # library points at /servarr-media/tv and the Movies library also scans
      # /servarr-media/movies. This bridges the Jellyfin (./media) vs Servarr
      # (./media-data) tree split so grabbed titles appear in the library.
      - ${MEDIA_ROOT:-./media-data}/media:/servarr-media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=http://localhost:8096

  livekit:
    image: livekit/livekit-server:latest
    container_name: watchparty-livekit
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

  # coturn — uncomment for VPS deploy
  # coturn:
  #   image: coturn/coturn:latest
  #   container_name: watchparty-coturn
  #   network_mode: host
  #   volumes:
  #     - ./coturn.conf:/etc/coturn/turnserver.conf

  watchparty:
    build: ./app
    container_name: watchparty-app
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      # One port: built web UI + /api + Socket.io + /jellyfin + /livekit proxies.
      # Host 3000 was occupied by an unrelated process on this machine, so the
      # app is published on host 3001 -> container 3000. Change the left side to
      # "3000:3000" on a host where 3000 is free.
      - "3001:3000"
    volumes:
      # Persistent session store (file-based) so `--build` restarts don't log
      # everyone out — express-session's default MemoryStore is wiped on every
      # container recreate. See app/server/index.js's sessionStoreDir.
      - ./data/sessions:/data/sessions
      - ./data/subtitles:/data/subtitles
      # SSH private key used to trigger the recreate-reset forced-command on the
      # Neko host — read-only, never baked into the image (see app/Dockerfile).
      # PLACEHOLDER: generate this keypair per docs/ops/neko-recreate.md; the
      # file must exist and be readable before NEKO_ENABLED=true.
      - ./secrets/neko-recreate-key:/run/secrets/neko-recreate-key:ro
    env_file:
      # .env  = base (internal URLs, LiveKit keys, SESSION_SECRET)
      # .env.local = optional real secrets (servarr API keys, LiveKit keys).
      #   Both are pass-through only; the `environment:` block below overrides
      #   any service URLs so internal names always win inside the container.
      - .env
      - .env.local
    environment:
      # ── Server → service: INTERNAL container names (never sent to browser) ──
      - JELLYFIN_URL=http://jellyfin:8096
      - LIVEKIT_URL=ws://livekit:7880
      - SONARR_URL=http://sonarr:8989
      - RADARR_URL=http://radarr:7878
      - PROWLARR_URL=http://prowlarr:9696
      - BAZARR_URL=http://bazarr:6767
      - QBITTORRENT_URL=http://qbittorrent:8080
      # ── Browser → LiveKit: must be reachable from the user's machine. ───────
      # Default is the published host port; behind HTTPS set this (in .env) to
      # the app-origin signaling proxy, e.g. wss://<host>/livekit.
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      # Extra allowed CORS origin(s), comma-separated (dev + tailnet are built in).
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN:-}
      # ── Serve config ──
      - SERVE_CLIENT=1
      - PORT=3000
      # ── Neko collaborative browser (see docs/ops/neko-recreate.md) ─────────
      # Disabled by default. Flip to true only once the `neko` service below
      # is configured with matching secrets and the SSH forced-command host is
      # reachable — see NEKO_SSH_HOST/NEKO_SSH_KEY_PATH below.
      - NEKO_ENABLED=${NEKO_ENABLED:-false}
      - NEKO_INTERNAL_URL=http://neko:8080
      # NEKO_API_TOKEN must equal the `neko` service's NEKO_SESSION_API_TOKEN below.
      - NEKO_API_TOKEN=${NEKO_API_TOKEN:-}
      - NEKO_USER_PASSWORD=${NEKO_MEMBER_MULTIUSER_USER_PASSWORD:-}
      - NEKO_USERNAME_SECRET=${NEKO_USERNAME_SECRET:-}
      # Browser-facing WebRTC signaling endpoint — override in .env for a real deploy.
      - NEKO_PUBLIC_WS=${NEKO_PUBLIC_WS:-ws://localhost:9876}
      # SSH forced-command recreate target (docs/ops/neko-recreate.md). PLACEHOLDER:
      # fill in a real host/tailnet name and mount a real key before enabling.
      - NEKO_SSH_HOST=${NEKO_SSH_HOST:-neko-host.example}
      - NEKO_SSH_KEY_PATH=/run/secrets/neko-recreate-key
      - NEKO_IDLE_TIMEOUT_MS=${NEKO_IDLE_TIMEOUT_MS:-300000}
    depends_on:
      jellyfin:
        condition: service_started
      livekit:
        condition: service_started
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
      bazarr:
        condition: service_healthy
      qbittorrent:
        condition: service_started

  # Collaborative remote browser (see docs/specs/2026-07-20-neko-spike-decision.md
  # and docs/ops/neko-recreate.md). Pinned >= 3.1.2 (GHSA-2gw9-c2r2-f5qf) — never
  # `:latest`. The app reaches it internally at http://neko:8080; the reset
  # mechanism (container-recreate) is triggered over SSH from the app container
  # via a forced-command on the Neko HOST, not this compose file's docker socket.
  neko:
    image: ghcr.io/m1k1o/neko/firefox:3.1.4
    container_name: watchparty-neko
    restart: unless-stopped
    networks: [watchparty-net]
    shm_size: 2gb
    ports:
      # WebRTC EPR UDP range — must be reachable by client devices. TCP 8080 is
      # NOT published here on purpose; it's reached only via the app's /neko
      # proxy over the internal network (see docs/ops/neko-recreate.md's
      # network-boundary note).
      - "${NEKO_WEBRTC_EPR:-56000-56100}:${NEKO_WEBRTC_EPR:-56000-56100}/udp"
    environment:
      NEKO_WEBRTC_EPR: "${NEKO_WEBRTC_EPR:-56000-56100}"
      NEKO_WEBRTC_ICELITE: "1"
      # PLACEHOLDER: set to this host's public/tailnet IP reachable by clients.
      NEKO_WEBRTC_NAT1TO1: "${NEKO_WEBRTC_NAT1TO1:-127.0.0.1}"
      NEKO_MEMBER_PROVIDER: "multiuser"
      # PLACEHOLDER secrets — override in .env/.env.local before enabling.
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: "${NEKO_MEMBER_MULTIUSER_USER_PASSWORD:-changeme-user}"
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: "${NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD:-changeme-admin}"
      # Must equal the app service's NEKO_API_TOKEN above.
      NEKO_SESSION_API_TOKEN: "${NEKO_API_TOKEN:-}"
      NEKO_SESSION_COOKIE_ENABLED: "true"
      NEKO_SESSION_COOKIE_NAME: "NEKO_SESSION"
      NEKO_SERVER_PATH_PREFIX: "/neko"
      NEKO_DESKTOP_SCREEN: "1280x720@30"

  # ── Media-acquisition stack (Servarr + qBittorrent) ────────────────────────
  # All on watchparty-net so the app reaches them by name and they reach each
  # other (Prowlarr -> Sonarr, Sonarr -> qBittorrent). Config + media bind
  # mounts are preserved from the previous docker-compose.servarr.yml layout.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: watchparty-prowlarr
    restart: unless-stopped
    networks: [watchparty-net]
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/prowlarr:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: watchparty-sonarr
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/sonarr:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${SONARR_PORT:-8989}:8989"
    depends_on:
      - prowlarr
      - qbittorrent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: watchparty-radarr
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/radarr:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${RADARR_PORT:-7878}:7878"
    depends_on:
      - prowlarr
      - qbittorrent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: watchparty-bazarr
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/bazarr:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    depends_on:
      - sonarr
      - radarr
    healthcheck:
      # /api/system/status requires an API key (401 without one), which
      # falsely marked this container "unhealthy" forever and blocked any
      # service with `depends_on: condition: service_healthy` on it. Root `/`
      # needs no auth and returns 200 once Bazarr is actually up.
      test: ["CMD", "curl", "-fsS", "http://localhost:6767/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: watchparty-qbittorrent
    restart: unless-stopped
    networks: [watchparty-net]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=${QBITTORRENT_PORT:-8080}
    volumes:
      - ${CONFIG_ROOT:-./servarr-config}/qbittorrent:/config
      - ${MEDIA_ROOT:-./media-data}:/data
    ports:
      - "${QBITTORRENT_PORT:-8080}:${QBITTORRENT_PORT:-8080}"
      - "${QBITTORRENT_BT_PORT:-6881}:6881"
      - "${QBITTORRENT_BT_PORT:-6881}:6881/udp"

networks:
  # Single shared network — every service resolves the others by container name.
  watchparty-net:
    name: watchparty-net
    driver: bridge
