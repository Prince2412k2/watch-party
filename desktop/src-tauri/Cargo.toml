[package]
name = "watchparty-desktop"
version = "0.1.0"
description = "Watchparty desktop — all-codec playback, offline downloads, watch-party sync"
edition = "2021"
rust-version = "1.77"

[lib]
name = "watchparty_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
http-downloader = { version = "0.3.2", default-features = false, features = ["breakpoint-resume", "bson-file-archiver", "tracing"] }
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "fs", "sync", "time"] }
uuid = { version = "1.20.0", features = ["v4", "serde"] }
url = "2.5.8"
once_cell = "1.21.4"
chrono = { version = "0.4.45", features = ["serde"] }
# N1 (mpv.rs) will add an mpv binding crate here (e.g. `libmpv2`) once the
# Phase-0 spike confirms the compositing approach and the exact crate/version.
# N2 (download.rs) will add an HTTP client (e.g. `reqwest`) + async runtime
# (`tokio`) here for the multi-part downloader.

[features]
custom-protocol = ["tauri/custom-protocol"]

[dev-dependencies]
tempfile = "3.27.0"
